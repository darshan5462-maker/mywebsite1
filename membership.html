<script>
document.getElementById("memberForm").addEventListener("submit", function(e){
  e.preventDefault();

  const form = document.getElementById("memberForm");
  const photoInput = document.getElementById("photo");

  if (!photoInput.files.length) {
    alert("Please select photo");
    return;
  }

  const reader = new FileReader();

  reader.onload = function () {
    const base64Photo = reader.result.split(",")[1];

    const data = new FormData(form);
    data.append("action", "membership");
    data.append("photo", base64Photo);
    data.append("photoType", photoInput.files[0].type);

    fetch("https://script.google.com/macros/s/AKfycbxWknOVhux0fGiSjmU_TxR1lQW7E_bWS4NoZs-s4pzI5Vm-_C2qXIiBXskyNtDh__2z/exec", {
      method: "POST",
      body: data
    })
    .then(res => res.json())
    .then(res => {
  console.log("SERVER RESPONSE:", res);

  if (res.status === "success") {
    window.location.href = "thanks.html?id=" + res.id;
  } else {
    alert("Server error:\n" + (res.error || "Unknown error"));
  }
})
    .catch(err => {
      console.error(err);
      alert("Upload failed");
    });
  };

  reader.readAsDataURL(photoInput.files[0]);
});
</script>

document.getElementById("memberForm").addEventListener("submit", function(e){
  e.preventDefault();

  const form = document.getElementById("memberForm");
  const photoInput = document.getElementById("photo");

  if (!photoInput.files.length) {
    alert("ಫೋಟೋ ಆಯ್ಕೆಮಾಡಿ / Please select photo");
    return;
  }

  const reader = new FileReader();
  reader.onload = function () {
    const base64Photo = reader.result.split(",")[1];

    const data = new FormData(form);
    data.append("photo", base64Photo);
    data.append("photoType", photoInput.files[0].type);

    fetch(SCRIPT_URL, { method: "POST", body: data })
      .then(res => res.json())
      .then(res => {
        console.log("SERVER RESPONSE:", res);

        if (res.status === "success") {

          

          window.location.href = "thanks.html?id=" + res.id;
        
        } else {
          alert("Server error:\n" + (res.error || "Unknown error"));
        }
      })
      .catch(err => {
        console.error(err);
        alert("Upload failed");
      });
  };

  reader.readAsDataURL(photoInput.files[0]);
});
</script>

<script>
/* ✅ Aadhaar validation */
document.getElementById("aadhaar").addEventListener("input", function(){
  this.value = this.value.replace(/\D/g,"").slice(0,12);
});

/* ✅ Same address copy (works correctly) */
document.getElementById("sameAddress").addEventListener("change", function(){
  const current = document.getElementById("currentAddress");
  const permanent = document.getElementById("permanentAddress");

  if(this.checked){
    permanent.value = current.value;
    current.addEventListener("input", () => permanent.value = current.value);
  }
});
</script>

<script>
/* ✅ District → Taluk Map */
const districtSelect =
document.getElementById("district");

const talukSelect =
document.getElementById("taluk");

const villageSelect =
document.getElementById("village");

const panchayatInput =
document.getElementById("panchayat");

Object.keys(districtTalukMap).forEach(d => {

  const option =
  document.createElement("option");

  option.value = d;
  option.textContent = d;

  districtSelect.appendChild(option);

});

districtSelect.addEventListener("change", () => {

  talukSelect.innerHTML =
  '<option value="">ಆಯ್ಕೆಮಾಡಿ / Select Taluk</option>';

  villageSelect.innerHTML =
  '<option value="">ಆಯ್ಕೆಮಾಡಿ / Select Village</option>';

  panchayatInput.value = "";

  (districtTalukMap[districtSelect.value] || [])
  .forEach(t => {

    const option =
    document.createElement("option");

    option.value = t;
    option.textContent = t;

    talukSelect.appendChild(option);

  });

});

talukSelect.addEventListener("change", () => {

  villageSelect.innerHTML =
  '<option value="">ಆಯ್ಕೆಮಾಡಿ / Select Village</option>';

  const villages =
  villageDatabase.filter(v =>
    v.district === districtSelect.value &&
    v.taluk === talukSelect.value
  );

  villages.forEach(v => {

    const option =
    document.createElement("option");

    option.value = v.village;
    option.textContent = v.village;

    villageSelect.appendChild(option);

  });

});

villageSelect.addEventListener("change", () => {

  const record =
  villageDatabase.find(v =>
    v.district === districtSelect.value &&
    v.taluk === talukSelect.value &&
    v.village === villageSelect.value
  );

  if(record){
    panchayatInput.value =
    record.panchayat;
  }

});


</script>
